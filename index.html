<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي المطور</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f7f2fa; /* لون خلفية مريح من ميريال 3 */
            color: #1d1b20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: #fffbfe;
            padding: 32px;
            border-radius: 28px; /* حواف دائرية عصرية */
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            color: #6750a4; /* اللون البنفسجي الأساسي للماتيريال */
            margin-bottom: 16px;
        }
        p {
            font-size: 16px;
            color: #49454f;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        button {
            background-color: #6750a4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 100px; /* زر دائري بالكامل */
            cursor: pointer;
            transition: box-shadow 0.2s, background-color 0.2s;
        }
        button:hover {
            background-color: #513e85;
            box-shadow: 0px 1px 3px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>تم تحديث الموقع بنجاح! 🚀</h1>
        <p id="status">هذا هو المظهر الجديد للموقع بعد التحديث. اضغط على الزر بالأسفل لتجربة حركة تفاعلية جديدة.</p>
        <button onclick="updatePage()">تفاعل مع التحديث</button>
    </div>

    <script>
        function updatePage() {
            const statusText = document.getElementById("status");
            statusText.innerHTML = "✨ مذهل! لقد تعلمت الآن كيف تقوم بتحديث موقعك وتغيير الكود في أي وقت تريده.";
            statusText.style.color = "#6750a4";
        }
    </script>

</body>
</html>
