<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيقي</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f7f2fa;
            color: #1d1b20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: #fffbfe;
            padding: 32px;
            border-radius: 28px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            color: #6750a4;
            margin-bottom: 8px;
        }
        .version {
            display: inline-block;
            background-color: #e8def8;
            color: #1d192b;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            color: #49454f;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        /* تصميم زر التحميل بأسلوب Material 3 */
        .download-btn {
            display: inline-block;
            background-color: #6750a4;
            color: white;
            text-decoration: none; /* لإزالة الخط أسفل الرابط */
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 100px;
            transition: box-shadow 0.2s, background-color 0.2s;
            box-shadow: 0px 1px 3px rgba(0,0,0,0.2);
        }
        .download-btn:hover {
            background-color: #513e85;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>تحميل التطبيق الرسمي 📱</h1>
        <span class="version">الإصدار v1.0.0</span>
        
        <p>اضغط على الزر بالأسفل لتحميل ملف الـ APK مباشرة وثبيته على جهازك الأندرويد.</p>
        
        <a href="app-release.apk" download class="download-btn">تحميل الآن (APK)</a>
    </div>

</body>
</html>
