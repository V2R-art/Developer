<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة تطبيقي مع الصور</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f7f2fa;
            color: #1d1b20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: #fffbfe;
            padding: 24px;
            border-radius: 28px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }
        /* تصميم أيقونة التطبيق الدائرية */
        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 16px; /* حواف ناعمة للأيقونة */
            object-fit: cover;
            margin-bottom: 12px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            color: #6750a4;
            margin: 0 0 4px 0;
        }
        .developer-name {
            font-size: 14px;
            color: #79747e;
            margin-bottom: 16px;
        }
        /* تصميم صورة الإعلان (البانر) */
        .promo-banner {
            width: 100%;
            height: auto;
            border-radius: 20px; /* حواف متناسقة مع البطاقة */
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0px 1px 4px rgba(0,0,0,0.1);
        }
        p {
            font-size: 15px;
            color: #49454f;
            line-height: 1.6;
            margin: 0 0 24px 0;
        }
        .download-btn {
            display: inline-block;
            background-color: #6750a4;
            color: white;
            text-decoration: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 100px;
            transition: box-shadow 0.2s, background-color 0.2s;
            box-shadow: 0px 1px 3px rgba(0,0,0,0.2);
        }
        .download-btn:hover {
            background-color: #513e85;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="icon.png" alt="أيقونة التطبيق" class="app-icon">
        
        <h1>اسم تطبيقك المميز</h1>
        <div class="developer-name">بواسطة V2R-art</div>
        
        <img src="banner.png" alt="إعلان التطبيق" class="promo-banner">
        
        <p>اكتشف الميزات الرائعة داخل التطبيق المطور بأحدث التقنيات. اضغط بالأسفل للتحميل المباشر والآمن لملف الـ APK.</p>
        
        <a href="app-release.apk" download class="download-btn">تحميل الآن (APK)</a>
    </div>

</body>
</html>
